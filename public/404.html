<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — TeerHub</title>
  <link rel="stylesheet" href="./styles/reset.css" />
  <link rel="stylesheet" href="./styles/styles.css" />
  <link rel="stylesheet" href="./styles/404.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header header-404">
    <div class="container nav-container">
      <a href="/" class="logo">TeerHub</a>
      <nav class="nav nav-404">
        <a href="/">Головна</a>
      </nav>
    </div>
  </header>

  <main class="error-page">
    <section class="error-panel">
      <div class="error-card">
        <span class="error-code">404</span>
        <h1>Сторінку не знайдено</h1>
        <p>
          На жаль, ми не змогли знайти ту сторінку. Можливо, посилання неправильне або вона була видалена.
        </p>

        <div class="error-actions">
          <a href="/" class="btn btn-primary">Повернутися на головну</a>
        </div>
      </div>

      
    </section>
  </main>
</body>
</html>
